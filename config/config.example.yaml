# WeatherNext Pro Configuration
# Copy this to config.yaml and fill in your values

weather:
  provider: "google_maps"          # Using Google Maps Weather API (WeatherNext 2 backend)
  api_key: "${GMAPS_API_KEY}"
  forecast_hours: 24               # Hours ahead to forecast
  cache_ttl_minutes: 30            # Cache weather data for 30 mins

polymarket:
  host: "https://clob.polymarket.com"
  chain_id: 137                    # Polygon mainnet
  private_key: "${POLY_PRIVATE_KEY}"
  api_key: "${POLY_API_KEY}"
  api_secret: "${POLY_API_SECRET}"
  api_passphrase: "${POLY_API_PASSPHRASE}"

trading:
  min_edge_pct: 10.0               # Only trade if our prob differs by >10%
  max_position_usdc: 20.0          # Max $20 per trade (paper trading mode)
  paper_trading: true              # Set to false when ready for real money
  target_markets:
    - slug: "highest-temp-shanghai"
      city: "Shanghai"
      lat: 31.2304
      lng: 121.4737
    - slug: "highest-temp-singapore"
      city: "Singapore"
      lat: 1.3521
      lng: 103.8198
    - slug: "highest-temp-seoul"
      city: "Seoul"
      lat: 37.5665
      lng: 126.9780
    - slug: "highest-temp-london"
      city: "London"
      lat: 51.5074
      lng: -0.1278

scanner:
  interval_minutes: 15            # Scan markets every 15 minutes
  start_hour_hkt: 7               # Start scanning at 7am HKT
  stop_hour_hkt: 23               # Stop scanning at 11pm HKT

logging:
  level: "INFO"
  file: "logs/weathernext_pro.log"
  rotation: "50 MB"
